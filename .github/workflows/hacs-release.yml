name: Build HACS Release Asset

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build HACS zip
        run: python scripts/build_hacs_zip.py

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dspremote-ha.zip
